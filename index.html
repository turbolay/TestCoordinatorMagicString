<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Text Example</title>
    <style>
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="copyButton">Copy Me</button>

    <script>
        document.getElementById('copyButton').addEventListener('click', function() {
            const textToCopy = 'name=My%20Little%20Coordinator&network=main&coordinatorUri=https://api.test.com&coordinationFeeRate=0.001&readMore=https://test.com&absoluteMinInputCount=13';
            
            navigator.clipboard.writeText(textToCopy).then(function() {
                alert('Text copied to clipboard');
            }, function(err) {
                console.error('Could not copy text: ', err);
            });
        });
    </script>
</body>
</html>
